name: CI

# PR validation: build + lint before merge to main.
# A smoke-orchestrator step will be added once scripts/smoke-orchestrator.mjs
# is converted to use assertions (see AUDIT.md item #4).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
